<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
          rel="stylesheet"
          integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
          crossorigin="anonymous">
    <link href="{{ url_for('static', filename='css/main.css') }}" type="text/css" rel="stylesheet">
</head>
<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
            <a class="navbar-brand" style="font-size: 30px;" href="/">AskAndLearn</a>
            <div class="collapse navbar-collapse">
                <div class="navbar-nav">
                    <a class="navbar-brand" href="/">Questions</a>
                </div>
            </div>
            <div class="navbar-nav">
                {% if user %}
                    <a class="navbar-brand" href="/">{{ user.name }}</a>
                {% else %}
                    <a class="btn btn-success" style="margin-right: 10px" href="/auth/register">Register</a>
                    <a class="btn btn-primary" href="/auth/login">Login</a>
                {% endif %}
            </div>
      </div>
    </nav>
    <div class="content-container">{% block content %}{% endblock %}</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"></script>
</body>
</html>
